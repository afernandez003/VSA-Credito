name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Verificar formatação (dotnet format)
        run: dotnet format --verify-no-changes

      - name: Verificar pacotes vulneráveis
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee /tmp/vulnerable.txt
          if grep -q "has the following vulnerable packages" /tmp/vulnerable.txt; then
            echo "::error::Pacotes NuGet com vulnerabilidades conhecidas encontrados!"
            exit 1
          fi

      - name: Test + Coverage
        run: |
          dotnet test --no-restore \
            -p:PublishAot=false \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "liquid.md;LogFileName=test-results.md" \
            --results-directory tests/TestResults \
            --collect:"XPlat Code Coverage" \
            --settings tests/Tests/coverlet.runsettings

      - name: Coverage Report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: 'tests/TestResults/**/coverage.cobertura.xml'
          targetdir: 'tests/TestResults/coverage'
          reporttypes: 'Html;MarkdownSummaryGithub'

      - name: Publicar Coverage no Job Summary
        run: cat tests/TestResults/coverage/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
        if: always()

      - name: Comentar Coverage no PR
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: tests/TestResults/coverage/SummaryGithub.md

      - name: Upload artefatos de teste
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: |
            tests/TestResults/test-results.trx
            tests/TestResults/test-results.md
            tests/TestResults/coverage/
          retention-days: 30
